<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amine&Shirts | متجر القمصان الفاخرة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        * { font-family: 'Cairo', sans-serif; }
        .product-card { transition: all 0.3s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-8px); }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <div class="flex justify-between items-center mb-8 pb-4 border-b border-gray-200">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-black text-2xl">A</div>
                <div><h1 class="text-2xl font-black">AMINE<span class="text-blue-500">&amp;</span>SHIRTS</h1><p class="text-xs text-gray-500">متجر الملابس الفاخرة</p></div>
            </div>
            <button onclick="openCart()" class="relative bg-white shadow-md p-3 rounded-full"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6M17 13l1.5 6M9 21h6M12 18v3"></path></svg><span id="cartCount" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 hidden items-center justify-center">0</span></button>
        </div>

        <div id="emptyState" class="text-center py-20"><div class="text-8xl mb-4">👕✨</div><h2 class="text-3xl font-bold text-gray-700 mb-2">المتجر فارغ حالياً!</h2><p class="text-gray-500">سيتم إضافة المنتجات قريباً</p></div>
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
    </div>

    <!-- نماذج الشراء (نفس الكود السابق) -->
    <div id="productModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="closeModal()"><div class="bg-white rounded-2xl max-w-md w-full p-6" onclick="event.stopPropagation()"><div class="flex justify-between items-start mb-4"><h2 id="modalTitle" class="text-2xl font-bold"></h2><button onclick="closeModal()">✕</button></div><img id="modalImage" class="w-full h-64 object-cover rounded-xl mb-4"><p id="modalPrice" class="text-blue-600 font-bold text-xl mb-4"></p><div class="mb-4"><label class="block text-sm font-bold mb-2">📏 المقاس</label><div class="flex gap-2"><button onclick="selectSize(this,'S')" class="size-btn w-12 h-12 border-2 rounded-xl">S</button><button onclick="selectSize(this,'M')" class="size-btn w-12 h-12 border-2 rounded-xl">M</button><button onclick="selectSize(this,'L')" class="size-btn w-12 h-12 border-2 rounded-xl">L</button><button onclick="selectSize(this,'XL')" class="size-btn w-12 h-12 border-2 rounded-xl">XL</button></div></div><div class="mb-4"><label class="block text-sm font-bold mb-2">🎨 اللون</label><div class="flex gap-3"><button onclick="selectColor(this,'أبيض')" class="color-btn w-10 h-10 rounded-full border-2" style="background:white"></button><button onclick="selectColor(this,'أسود')" class="color-btn w-10 h-10 rounded-full border-2" style="background:black"></button><button onclick="selectColor(this,'رمادي')" class="color-btn w-10 h-10 rounded-full border-2" style="background:gray"></button></div></div><div class="mb-4"><label class="block text-sm font-bold mb-2">🔢 الكمية</label><div class="flex items-center gap-3"><button onclick="changeQty(-1)" class="w-10 h-10 border-2 rounded-xl">-</button><span id="qtyValue" class="text-xl font-bold w-12 text-center">1</span><button onclick="changeQty(1)" class="w-10 h-10 border-2 rounded-xl">+</button></div></div><button onclick="addToCart()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-bold">🛒 إضافة إلى السلة</button></div></div>

    <div id="cartModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="closeCart()"><div class="bg-white rounded-2xl max-w-md w-full p-6" onclick="event.stopPropagation()"><div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold">🛍️ سلتي</h2><button onclick="closeCart()">✕</button></div><div id="cartItems" class="max-h-96 overflow-y-auto mb-4"></div><div class="border-t pt-4 mb-4"><div class="flex justify-between font-bold text-lg"><span>المجموع:</span><span id="cartTotal" class="text-blue-600">$0</span></div></div><button onclick="checkout()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-xl font-bold">💳 إتمام الشراء</button></div></div>

    <div id="checkoutModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4" onclick="closeCheckout()"><div class="bg-white rounded-2xl max-w-md w-full p-6" onclick="event.stopPropagation()"><h2 class="text-2xl font-bold mb-4">📝 معلومات الطلب</h2><input type="text" id="customerName" placeholder="الاسم الكامل" class="w-full p-3 border rounded-xl mb-3"><input type="text" id="customerAddress" placeholder="العنوان" class="w-full p-3 border rounded-xl mb-3"><input type="tel" id="customerPhone" placeholder="رقم الهاتف" class="w-full p-3 border rounded-xl mb-4"><button onclick="submitOrder()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-bold">✅ تأكيد الطلب</button></div></div>

    <script>
        let products = [], cart = [], selectedProduct = null, selectedSize = 'M', selectedColor = 'أبيض', qty = 1;
        const API_URL = window.location.origin;  // يستخدم نفس رابط الموقع تلقائياً

        async function loadProducts() {
            const response = await fetch(`${API_URL}/api/products`);
            const data = await response.json();
            products = data.products || [];
            if (products.length === 0) { document.getElementById('emptyState').classList.remove('hidden'); document.getElementById('productsGrid').innerHTML = ''; }
            else { document.getElementById('emptyState').classList.add('hidden'); renderProducts(); }
        }

        function renderProducts() {
            document.getElementById('productsGrid').innerHTML = products.map(p => `<div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm"><img src="${p.imageUrl}" class="w-full h-64 object-cover" onclick="openModal(${p.id})"><div class="p-4"><div class="flex justify-between items-start mb-2"><h3 class="font-bold text-lg">${p.name}</h3><span class="text-blue-600 font-bold">$${p.price}</span></div><p class="text-sm text-gray-500 mb-3">${p.brand} · ${p.type} · ${p.style}</p><button onclick="openModal(${p.id})" class="w-full bg-gray-900 text-white py-2 rounded-xl font-bold hover:bg-blue-600">اشتري الآن</button></div></div>`).join('');
        }

        function openModal(id) { selectedProduct = products.find(p => p.id === id); document.getElementById('modalTitle').innerText = selectedProduct.name; document.getElementById('modalImage').src = selectedProduct.imageUrl; document.getElementById('modalPrice').innerHTML = `$${selectedProduct.price}`; qty = 1; document.getElementById('qtyValue').innerText = qty; document.getElementById('productModal').style.display = 'flex'; }
        function selectSize(btn, size) { selectedSize = size; document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('border-blue-500', 'bg-blue-50')); btn.classList.add('border-blue-500', 'bg-blue-50'); }
        function selectColor(btn, color) { selectedColor = color; document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('ring-2', 'ring-blue-500')); btn.classList.add('ring-2', 'ring-blue-500'); }
        function changeQty(delta) { qty += delta; if (qty < 1) qty = 1; document.getElementById('qtyValue').innerText = qty; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
        function addToCart() { let existing = cart.find(i => i.id === selectedProduct.id && i.size === selectedSize && i.color === selectedColor); if (existing) existing.qty += qty; else cart.push({ ...selectedProduct, size: selectedSize, color: selectedColor, qty }); updateCartUI(); closeModal(); Swal.fire('تم الإضافة', '', 'success'); }
        function updateCartUI() { let count = cart.reduce((s, i) => s + i.qty, 0); let badge = document.getElementById('cartCount'); if (count > 0) { badge.innerText = count; badge.classList.add('flex'); badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); } }
        function openCart() { let container = document.getElementById('cartItems'); if (cart.length === 0) container.innerHTML = '<div class="text-center py-8 text-gray-500">سلتك فارغة</div>'; else { container.innerHTML = cart.map((i, idx) => `<div class="flex gap-3 mb-3 p-3 bg-gray-50 rounded-xl"><img src="${i.imageUrl}" class="w-16 h-16 object-cover rounded-lg"><div class="flex-1"><p class="font-bold">${i.name}</p><p class="text-sm text-gray-500">${i.size} / ${i.color}</p><div class="flex justify-between items-center mt-2"><div class="flex gap-2"><button onclick="changeCartQty(${idx}, -1)" class="w-7 h-7 border rounded-lg">-</button><span>${i.qty}</span><button onclick="changeCartQty(${idx}, 1)" class="w-7 h-7 border rounded-lg">+</button></div><span class="font-bold text-blue-600">$${i.price * i.qty}</span></div></div><button onclick="removeFromCart(${idx})" class="text-red-500">🗑️</button></div>`).join(''); let total = cart.reduce((s, i) => s + (i.price * i.qty), 0); document.getElementById('cartTotal').innerText = `$${total}`; } document.getElementById('cartModal').style.display = 'flex'; }
        function changeCartQty(idx, delta) { cart[idx].qty += delta; if (cart[idx].qty < 1) cart.splice(idx, 1); updateCartUI(); openCart(); }
        function removeFromCart(idx) { cart.splice(idx, 1); updateCartUI(); openCart(); }
        function closeCart() { document.getElementById('cartModal').style.display = 'none'; }
        function checkout() { if (cart.length === 0) { Swal.fire('تنبيه', 'سلتك فارغة', 'warning'); return; } closeCart(); document.getElementById('checkoutModal').style.display = 'flex'; }
        function closeCheckout() { document.getElementById('checkoutModal').style.display = 'none'; }
        async function submitOrder() { let name = document.getElementById('customerName').value, address = document.getElementById('customerAddress').value, phone = document.getElementById('customerPhone').value; if (!name || !address || !phone) { Swal.fire('تنبيه', 'الرجاء ملء جميع الحقول', 'warning'); return; } let total = cart.reduce((s, i) => s + (i.price * i.qty), 0); let items = cart.map(i => ({ name: i.name, size: i.size, color: i.color, qty: i.qty, price: i.price })); let response = await fetch(`${API_URL}/api/orders`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ customerName: name, customerAddress: address, customerPhone: phone, items, total }) }); let data = await response.json(); if (data.success) { Swal.fire('تم الطلب', 'تم استلام طلبك بنجاح!', 'success'); cart = []; updateCartUI(); closeCheckout(); } else { Swal.fire('خطأ', data.message, 'error'); } }
        loadProducts();
    </script>
</body>
</html>
